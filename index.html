<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi người anh thương ❤️</title>
    <style>
        body { background-color: #ffebee; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        h1 { color: #d32f2f; text-align: center; }
        .btn-group { margin-top: 30px; }
        button { padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        #yes { background-color: #ff8a80; color: white; margin-right: 20px; }
        #no { background-color: #cfd8dc; color: #37474f; position: absolute; }
        .heart { position: absolute; color: #ff1744; font-size: 20px; animation: fly 3s infinite linear; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
    </style>
</head>
<body>
    <h1>Em đồng ý đi chs với anh nha? ❤️</h1>
    <div class="btn-group">
        <button id="yes" onclick="accepted()">Đồng ý</button>
        <button id="no" onmouseover="moveButton()">Không</button>
    </div>

    <script>
        function moveButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            document.getElementById('no').style.left = x + 'px';
            document.getElementById('no').style.top = y + 'px';
        }
        function accepted() {
            alert("Anh biết mà! Hẹn gặp em sớm nhất nhé ❤️");
        }
        // Tạo hiệu ứng trái tim bay
        setInterval(() => {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.bottom = '0';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }, 300);
    </script>
</body>
</html>
